<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Empadronamiento App</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f9; max-width: 400px; margin: 0 auto; }
    h2 { color: #333; text-align: center; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-weight: bold; margin-bottom: 5px; }
    input[type="text"], input[type="number"], select { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; }
    button { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    
    .btn-save { background-color: #28a745; color: white; }
    .btn-zip { background-color: #007bff; color: white; margin-top: 30px; }
    
    .btn-descargar-final { 
      background-color: #ffc107; color: #333; display: none; font-size: 1.1em; 
      font-weight: bold; border: 2px solid #e0a800; text-align: center; 
      text-decoration: none; padding: 12px; margin-top: 10px; border-radius: 5px; box-sizing: border-box;
    }
    
    .btn-clear { background-color: #dc3545; color: white; }
    
    #status { margin-top: 15px; text-align: center; font-weight: bold; color: #0056b3; }
    #lista-fotos { margin-top: 20px; font-weight: bold; text-align: center; color: #333; }
    #urb-input { display: none; margin-top: 8px; border-color: #007bff; }
    
    .btn-toggle { background-color: #e2e3e5; color: #383d41; margin-top: 5px; font-size: 0.9em; padding: 8px; }
    #contenedor-lista { display: none; margin-top: 10px; background: white; border: 1px solid #ddd; border-radius: 5px; max-height: 200px; overflow-y: auto; }
    
    .item-registro { padding: 10px; border-bottom: 1px solid #eee; font-size: 0.85em; color: #555; display: flex; align-items: center; }
    .item-registro:last-child { border-bottom: none; }
    .item-registro strong { color: #333; margin-right: 8px;}

    .btn-previsualizar { background-color: #17a2b8; color: white; border: none; border-radius: 3px; padding: 4px 8px; margin-right: 8px; cursor: pointer; font-size: 0.8em; }

    .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.8); }
    .modal-content { background-color: #fefefe; margin: 10% auto; padding: 15px; border: 1px solid #888; border-radius: 8px; width: 90%; max-width: 350px; }
    .close-modal { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
    .close-modal:hover, .close-modal:focus { color: black; text-decoration: none; }

    .botones-foto { display: flex; gap: 10px; margin-top: 5px; }
    .btn-opcion-foto { flex: 1; background-color: #6c757d; color: white; padding: 10px; border-radius: 5px; margin-top: 0; }
    .btn-opcion-foto:active { background-color: #5a6268; }
    #indicador-foto { font-size: 0.9em; color: #28a745; font-weight: bold; display: none; margin-top: 8px; text-align: center;}

    /* NUEVO: Estilos para la edición en el modal */
    .edit-container { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
    .edit-row { display: flex; gap: 8px; }
    .edit-row input { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9em; text-transform: uppercase;}
    .btn-update { background-color: #ffc107; border: none; padding: 10px; border-radius: 4px; font-weight: bold; cursor: pointer; color: #333; margin-top: 5px;}
    .btn-delete-item { background-color: #dc3545; border: none; padding: 10px; border-radius: 4px; font-weight: bold; cursor: pointer; color: white; margin-top: 5px;}
  </style>
</head>
<body>

  <div id="modal-previsualizacion" class="modal">
    <div class="modal-content">
      <span class="close-modal" onclick="cerrarPrevisualizacion()">&times;</span>
      <h3 style="margin-top: 0; text-align: center; font-size: 1.1em; color: #333;">Detalles del Lote</h3>
      
      <div class="edit-container">
        <label style="font-size: 0.8em; margin-bottom: -5px; color: #666;">Urbanización:</label>
        <input type="text" id="edit-urb" autocomplete="off">
        
        <div class="edit-row">
          <div style="flex: 1;">
            <label style="font-size: 0.8em; color: #666;">Manzana:</label>
            <input type="text" id="edit-mz" autocomplete="off" style="width: 100%;">
          </div>
          <div style="flex: 1;">
            <label style="font-size: 0.8em; color: #666;">Lote:</label>
            <input type="text" id="edit-lote" autocomplete="off" style="width: 100%;">
          </div>
        </div>
        
        <button class="btn-update" onclick="guardarEdicion()">💾 Guardar Cambios</button>
        <button class="btn-delete-item" onclick="eliminarRegistroModal()">🗑️ Eliminar Lote</button>
      </div>

      <img id="img-previsualizacion" src="" alt="Previsualización" style="max-width: 100%; height: auto; border-radius: 5px; display: block; margin: 0 auto;">
    </div>
  </div>

  <h2>📸 Registro de Predios</h2>

  <div class="form-group">
    <label>Urbanización:</label>
    <select id="urb-select" onchange="verificarNuevaUrb()">
    </select>
    <input type="text" id="urb-input" placeholder="Escribe el nombre de la nueva urbanización" autocomplete="off">
  </div>

    <div class="form-group">
    <label>Manzana:</label>
    <input type="text" id="mz" placeholder="Ej: MZ A, MZ 01, PARCELA 02..." autocomplete="off">
  </div>

  <div class="form-group">
    <label>Lote:</label>
    <input type="text" id="lote" placeholder="Ej: LT 1, LT 2-B, PARCELA 03..." autocomplete="off">
  </div>

  <div class="form-group">
    <label>Añadir Foto:</label>
    <div class="botones-foto">
      <button type="button" class="btn-opcion-foto" onclick="document.getElementById('foto-camara').click()">📷 Cámara</button>
      <button type="button" class="btn-opcion-foto" onclick="document.getElementById('foto-galeria').click()">🖼️ Galería</button>
    </div>
    
    <input type="file" id="foto-camara" accept="image/*" capture="environment" style="display:none" onchange="manejarFoto(this)">
    <input type="file" id="foto-galeria" accept="image/*" style="display:none" onchange="manejarFoto(this)">
    
    <div id="indicador-foto">✅ Imagen seleccionada</div>
  </div>

  <button class="btn-save" onclick="guardarRegistro()">💾 Guardar en Memoria</button>
  <div id="status"></div>

  <div id="lista-fotos">Registros en memoria: 0</div>
  <button id="btn-toggle" class="btn-toggle" onclick="toggleLista()">👁️ Mostrar detalles guardados</button>
  
  <div id="contenedor-lista"></div>

  <hr style="margin-top: 30px;">

  <button id="btn-preparar" class="btn-zip" onclick="prepararZIP()">📦 1. Preparar Archivo ZIP</button>
  <a id="btn-descargar-enlace" class="btn-descargar-final">⬇️ 2. Descargar ZIP Listo</a>
  <button class="btn-clear" onclick="limpiarBaseDatos()">🗑️ Borrar Todo (Fin del día)</button>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').then(() => console.log('Service Worker registrado'));
    }

    // NUEVO: Variable global para saber qué lote estamos editando
    let idEdicionActual = null;

    function cargarUrbs() {
      const select = document.getElementById('urb-select');
      select.innerHTML = `<option value="">Seleccione una urbanización...</option><option value="NUEVA">➕ Escribir una nueva...</option>`;
      let historialUrbs = JSON.parse(localStorage.getItem('historialUrbanizaciones')) || [];
      historialUrbs.forEach(urb => {
        const option = document.createElement('option');
        option.value = urb;
        option.text = urb;
        select.insertBefore(option, select.lastElementChild);
      });
    }
    cargarUrbs(); 

    function verificarNuevaUrb() {
      const select = document.getElementById('urb-select');
      const input = document.getElementById('urb-input');
      if (select.value === 'NUEVA') {
        input.style.display = 'block';
        input.focus();
      } else {
        input.style.display = 'none';
        input.value = '';
      }
    }

    function manejarFoto(input) {
      if (input.files && input.files[0]) {
        document.getElementById('indicador-foto').style.display = 'block';
        if (input.id === 'foto-camara') {
          document.getElementById('foto-galeria').value = '';
        } else {
          document.getElementById('foto-camara').value = '';
        }
      } else {
        document.getElementById('indicador-foto').style.display = 'none';
      }
    }

    let db;
    const request = indexedDB.open("EmpadronamientoDB", 1);
    request.onupgradeneeded = (e) => {
      db = e.target.result;
      if (!db.objectStoreNames.contains('registros')) {
        db.createObjectStore('registros', { keyPath: 'id', autoIncrement: true });
      }
    };
    request.onsuccess = (e) => { db = e.target.result; actualizarContador(); };
    request.onerror = (e) => console.error("Error IndexedDB", e);

    function guardarRegistro() {
      const selectUrb = document.getElementById('urb-select');
      const inputUrb = document.getElementById('urb-input');
      
      let urb = selectUrb.value;
      if (urb === 'NUEVA') { 
        urb = inputUrb.value.toUpperCase().trim(); 
      } else {
        urb = urb.toUpperCase().trim();
      }

      const mz = document.getElementById('mz').value.toUpperCase().trim();
      const lote = document.getElementById('lote').value.toUpperCase().trim();
      const archivo = document.getElementById('foto-camara').files[0] || document.getElementById('foto-galeria').files[0];

      if (!urb || urb === 'NUEVA' || !mz || !lote || !archivo) {
        alert("Por favor completa todos los campos y añade una foto.");
        return;
      }

      document.getElementById('status').innerText = "⏳ Procesando imagen...";

      let historialUrbs = JSON.parse(localStorage.getItem('historialUrbanizaciones')) || [];
      if (!historialUrbs.includes(urb)) {
        historialUrbs.push(urb);
        historialUrbs.sort(); 
        localStorage.setItem('historialUrbanizaciones', JSON.stringify(historialUrbs));
        cargarUrbs(); 
        document.getElementById('urb-select').value = urb;
        inputUrb.style.display = 'none';
        inputUrb.value = '';
      }

      const reader = new FileReader();
      reader.onload = function(event) {
        const img = new Image();
        img.onload = function() {
          const MAX_WIDTH = 1920;
          const MAX_HEIGHT = 1920;
          let width = img.width;
          let height = img.height;

          if (width > height) {
            if (width > MAX_WIDTH) {
              height = Math.round(height * MAX_WIDTH / width);
              width = MAX_WIDTH;
            }
          } else {
            if (height > MAX_HEIGHT) {
              width = Math.round(width * MAX_HEIGHT / height);
              height = MAX_HEIGHT;
            }
          }

          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);

          const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
          const base64Data = dataUrl.split(',')[1]; 
          
          const registro = { urb, mz, lote, fotoBase64: base64Data, fecha: new Date().toISOString() };
          
          const tx = db.transaction("registros", "readwrite");
          const store = tx.objectStore("registros");
          store.add(registro);

          tx.oncomplete = () => {
            document.getElementById('status').innerText = `✅ Lote ${lote} guardado con éxito!`;
            document.getElementById('mz').value = ''; 
            document.getElementById('lote').value = '';
            document.getElementById('foto-camara').value = '';
            document.getElementById('foto-galeria').value = '';
            document.getElementById('indicador-foto').style.display = 'none';
            
            ocultarBotonDescarga();
            actualizarContador();
            setTimeout(() => document.getElementById('status').innerText = '', 3000);
          };
        };
        img.src = event.target.result; 
      };
      reader.readAsDataURL(archivo);
    }

    function toggleLista() {
      const contenedor = document.getElementById('contenedor-lista');
      const btn = document.getElementById('btn-toggle');
      if (contenedor.style.display === 'none' || contenedor.style.display === '') {
        contenedor.style.display = 'block';
        btn.innerHTML = '🙈 Ocultar detalles guardados';
      } else {
        contenedor.style.display = 'none';
        btn.innerHTML = '👁️ Mostrar detalles guardados';
      }
    }

    function actualizarContador() {
      const tx = db.transaction("registros", "readonly");
      const store = tx.objectStore("registros");
      const request = store.getAll();
      
      request.onsuccess = () => {
        const registros = request.result;
        document.getElementById('lista-fotos').innerText = `Registros en memoria: ${registros.length}`;
        const contenedor = document.getElementById('contenedor-lista');
        
        if (registros.length === 0) {
          contenedor.innerHTML = '<div class="item-registro" style="text-align:center;">No hay registros aún.</div>';
        } else {
          let html = '';
          registros.slice().reverse().forEach((reg, index) => {
            let numeroReal = registros.length - index; 
            html += `
              <div class="item-registro">
                <strong>#${numeroReal}</strong>
                <button class="btn-previsualizar" onclick="iniciarPrevisualizacion(${reg.id})">👁️ Editar / Foto</button>
                <span>${reg.urb} | ${reg.mz} | ${reg.lote}</span>
              </div>
            `;
          });
          contenedor.innerHTML = html;
        }
      };
    }

    // --- NUEVAS FUNCIONES DE EDICIÓN Y BORRADO ---
    function iniciarPrevisualizacion(id) {
      const tx = db.transaction("registros", "readonly");
      const store = tx.objectStore("registros");
      const request = store.get(id);
      request.onsuccess = () => {
        const reg = request.result;
        idEdicionActual = id; // Guardamos el ID del lote que se está editando
        
        // Llenamos los campos del modal
        document.getElementById('edit-urb').value = reg.urb;
        document.getElementById('edit-mz').value = reg.mz;
        document.getElementById('edit-lote').value = reg.lote;
        document.getElementById('img-previsualizacion').src = `data:image/jpeg;base64,${reg.fotoBase64}`;
        
        // Mostramos el modal
        document.getElementById('modal-previsualizacion').style.display = "block";
      };
    }

    function guardarEdicion() {
      if (!idEdicionActual) return;

      const nuevaUrb = document.getElementById('edit-urb').value.toUpperCase().trim();
      const nuevaMz = document.getElementById('edit-mz').value.toUpperCase().trim();
      const nuevoLote = document.getElementById('edit-lote').value.toUpperCase().trim();

      if (!nuevaUrb || !nuevaMz || !nuevoLote) {
        alert("Los campos no pueden estar vacíos.");
        return;
      }

      // Traemos el registro, lo actualizamos y lo volvemos a guardar
      const tx = db.transaction("registros", "readwrite");
      const store = tx.objectStore("registros");
      const request = store.get(idEdicionActual);

      request.onsuccess = () => {
        const reg = request.result;
        reg.urb = nuevaUrb;
        reg.mz = nuevaMz;
        reg.lote = nuevoLote;
        
        const updateRequest = store.put(reg);
        updateRequest.onsuccess = () => {
          
          // Guardamos la urbanización nueva en el historial si no existía
          let historialUrbs = JSON.parse(localStorage.getItem('historialUrbanizaciones')) || [];
          if (!historialUrbs.includes(nuevaUrb)) {
            historialUrbs.push(nuevaUrb);
            historialUrbs.sort(); 
            localStorage.setItem('historialUrbanizaciones', JSON.stringify(historialUrbs));
            cargarUrbs(); 
          }

          cerrarPrevisualizacion();
          actualizarContador();
          ocultarBotonDescarga(); // Hay que generar el ZIP de nuevo
          
          alert("✅ Datos actualizados correctamente.");
        };
      };
    }

    function eliminarRegistroModal() {
      if (!idEdicionActual) return;
      if (confirm("⚠️ ¿Estás completamente seguro de borrar esta foto y registro?")) {
        const tx = db.transaction("registros", "readwrite");
        const store = tx.objectStore("registros");
        store.delete(idEdicionActual);
        
        tx.oncomplete = () => {
          cerrarPrevisualizacion();
          actualizarContador();
          ocultarBotonDescarga();
        };
      }
    }

    function ocultarBotonDescarga() {
      const btnDescargar = document.getElementById('btn-descargar-enlace');
      btnDescargar.style.display = "none";
      btnDescargar.href = "";
    }
    // --- FIN DE FUNCIONES DE EDICIÓN ---

    function cerrarPrevisualizacion() {
      document.getElementById('modal-previsualizacion').style.display = "none";
      document.getElementById('img-previsualizacion').src = "";
      idEdicionActual = null;
    }
    
    window.onclick = function(event) {
      const modal = document.getElementById('modal-previsualizacion');
      if (event.target == modal) { cerrarPrevisualizacion(); }
    }

    function prepararZIP() {
      const tx = db.transaction("registros", "readonly");
      const store = tx.objectStore("registros");
      const request = store.getAll();

      request.onsuccess = () => {
        const registros = request.result;
        if (registros.length === 0) {
          alert("No hay registros para exportar.");
          return;
        }

        const btnPreparar = document.getElementById('btn-preparar');
        const btnDescargarEnlace = document.getElementById('btn-descargar-enlace');
        
        btnPreparar.disabled = true;
        document.getElementById('status').innerText = "⏳ Empaquetando fotos, espera...";
        
        try {
          const zip = new JSZip();

          registros.forEach(reg => {
            const nombreUrb = reg.urb.replace(/[^a-zA-Z0-9\s-]/g, '').replace(/\s+/g, '_');
            const nombreMz = reg.mz.replace(/[^a-zA-Z0-9\s-]/g, '').replace(/\s+/g, '_');
            
            const carpetaUrb = zip.folder(`${nombreUrb}`);
            const carpetaMz = carpetaUrb.folder(`${nombreMz}`);
            carpetaMz.file(`${reg.lote}.jpg`, reg.fotoBase64, {base64: true});
          });

          zip.generateAsync({type:"base64"}).then(function(base64) {
            const dataUri = "data:application/zip;base64," + base64;
            const fecha = new Date().toISOString().split('T')[0];
            
            btnDescargarEnlace.download = `Empadronamiento_${fecha}.zip`;
            btnDescargarEnlace.href = dataUri;
            
            document.getElementById('status').innerText = "✅ ¡ZIP Listo! Toca el botón amarillo.";
            btnPreparar.disabled = false;
            
            btnDescargarEnlace.style.display = "block";
            btnDescargarEnlace.onclick = function() {
              document.getElementById('status').innerText = "⬇️ Descarga en progreso...";
            };
            
          }).catch(function(error) {
            alert("Error al comprimir: " + error.message);
            btnPreparar.disabled = false;
          });

        } catch (error) {
          alert("Ocurrió un error: " + error.message);
          btnPreparar.disabled = false;
        }
      };
    }

    function limpiarBaseDatos() {
      if(confirm("⚠️ ¿Estás seguro? Esto borrará todas las fotos y la lista de urbanizaciones guardadas. Asegúrate de haber descargado el ZIP primero.")){
        const tx = db.transaction("registros", "readwrite");
        const store = tx.objectStore("registros");
        store.clear();
        
        tx.oncomplete = () => {
          localStorage.removeItem('historialUrbanizaciones');
          cargarUrbs();
          document.getElementById('urb-input').style.display = 'none';
          document.getElementById('urb-input').value = '';
          
          ocultarBotonDescarga();
          
          alert("Base de datos y lista limpias para un nuevo día.");
          actualizarContador();
        };
      }
    }
  </script>
</body>
</html>
